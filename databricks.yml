# This is a Databricks asset bundle definition for ev_charging_demand_lakehouse.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: ev-charging-demand-lakehouse
  uuid: a986b828-2d1c-469c-81bc-30899d63d854

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-f610dae9-4d7c.cloud.databricks.com
    variables:
      catalog: ev_charging_demand_lakehouse
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-f610dae9-4d7c.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/dzmitrysakalenka@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/dzmitrysakalenka@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ev_charging_demand_lakehouse
      schema: prod
    permissions:
      - user_name: dzmitrysakalenka@gmail.com
        level: CAN_MANAGE
