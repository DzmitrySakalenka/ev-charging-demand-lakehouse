# Databricks Asset Bundle definition for the EV Charging Demand Lakehouse.
# See https://docs.databricks.com/dev-tools/bundles/index.html.
#
# The bundle is intentionally minimal while the project bootstraps. It currently
# wires up a single smoke-test job that runs notebook/00_smoke_test.py against
# the dev workspace. The Python wheel artifact and the ETL pipeline have been
# removed until the corresponding source under src/ is in place (see SESSION.md).
bundle:
  name: ev-charging-demand-lakehouse
  uuid: a986b828-2d1c-469c-81bc-30899d63d854

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog catalog the lakehouse writes into.
  schema:
    description: Schema within the catalog used as the default working schema.
  cluster_id:
    description: Existing all-purpose cluster ID for ad-hoc bundle jobs.
  warehouse_id:
    description: Serverless SQL warehouse ID used by the ev_charging_overview dashboard.

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-f610dae9-4d7c.cloud.databricks.com
    variables:
      catalog: ev_charging_demo
      schema: ${workspace.current_user.short_name}
      # Small all-purpose cluster created during the first-time setup. If the
      # cluster is recreated, update this value (or override per-run with
      # `databricks bundle ... --var "cluster_id=$DATABRICKS_CLUSTER_ID"`).
      cluster_id: "0521-233118-4eww8ff6"
      # Serverless Starter Warehouse provisioned during dashboard setup.
      # Override per-run with
      #   `databricks bundle ... --var "warehouse_id=$DATABRICKS_WAREHOUSE_ID"`
      # if you want to target a different warehouse without editing this file.
      warehouse_id: "2e775cf5a88d3b2b"
  prod:
    mode: production
    workspace:
      host: https://dbc-f610dae9-4d7c.cloud.databricks.com
      # Pin the deploy path so we only ever keep a single prod copy of the bundle.
      root_path: /Workspace/Users/dzmitrysakalenka@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ev_charging_demo
      schema: prod
      # TODO: point this at the prod cluster once it exists.
      cluster_id: ""
      # TODO: point this at the prod SQL warehouse once it exists.
      warehouse_id: ""
    permissions:
      - user_name: dzmitrysakalenka@gmail.com
        level: CAN_MANAGE
